- name: Deploy single Qlik Sense node
  ansible.builtin.import_playbook: qlik.sense.single_node

- name: Deploy Server-Side Extensions
  hosts: localhost

  vars:
    deployment: "{{ lookup('ansible.builtin.env', 'PWD') | basename }}-sse"

  tasks:
    - name: Create a podman network
      containers.podman.podman_network:
        name: "{{ deployment }}"

    - name: Git checkout
      ansible.builtin.git:
        repo: git@github.com:QlikProfessionalServices/sse-ai.git
        dest: "{{ playbook_dir }}/sse-ai"
        update: false

    - name: Build container image
      containers.podman.podman_image:
        name: qlik-cso/sse-{{ item }}
        path: sse-ai
        build:
          file: Containerfile.{{ item }}
      loop:
        - openai
        - gemini
        - ollama

    - name: Create containers
      containers.podman.podman_container:
        name: "{{ deployment }}-{{ item }}"
        network: "{{ deployment }}"
        image: qlik-cso/sse-{{ item }}
        restart_policy: always
        ports:
          - "{{ container_port }}:{{ container_port }}"
        env_file: .env
        label:
          dev.qlik.deployment: "{{ deployment }}"
      vars:
        container_port: "{{ 50054 + idx }}"
      loop:
        - openai
        - gemini
        - ollama
      loop_control:
        index_var: idx

- name: Configure analytic connections
  hosts: central

  tasks:

    - name: Get Qlik Sense hostname
      ansible.builtin.slurp:
        src: C:\ProgramData\Qlik\Sense\Host.cfg
      register: host_cfg
      when: site_hostname is undefined

    - name: Set hostname fact
      ansible.builtin.set_fact:
        site_hostname: "{{ host_cfg.content | b64decode | b64decode }}"
      when: host_cfg.content is defined

    - name: Set xrfkey fact
      ansible.builtin.set_fact:
        xrfkey: "{{ lookup('password', '/dev/null', chars=['ascii_lowercase'], length=16) }}"

    - name: Login to Sense proxy
      ansible.windows.win_uri:
        url: "https://{{ site_hostname }}/qrs/about?Xrfkey={{ xrfkey }}"
        http_agent: Windows
        use_default_credential: yes
        headers:
          X-Qlik-Xrfkey: "{{ xrfkey }}"
      register: sense_login
      until: sense_login.status_code == 200
      retries: 30
      delay: 10

    - name: Set session cookie fact
      ansible.builtin.set_fact:
        qs_cookie: "{{ sense_login.set_cookie | regex_search('^[\\w-]+=[\\w-]+;') }}"

    - name: Create Qlik Sense resources
      module_defaults:
        ansible.windows.win_uri:
          headers:
            X-Qlik-Xrfkey: "{{ xrfkey }}"
            Cookie: "{{ qs_cookie }}"
      block:

        - name: Get analytic connections
          ansible.windows.win_uri:
            url: "https://{{ site_hostname }}/qrs/AnalyticConnection/full?Xrfkey={{ xrfkey }}"
            return_content: yes
          register: analytic_connections

        - name: Create analytic connections
          ansible.windows.win_uri:
            url: "https://{{ site_hostname }}/qrs/AnalyticConnection?Xrfkey={{ xrfkey }}"
            url_method: POST
            content_type: application/json
            body:
              name: "{{ item }}"
              host: 172.21.128.171
              port: "{{ 50054 + idx }}"
            status_code: 201
          loop:
            - OpenAI
            - Gemini
            - Ollama
          loop_control:
            index_var: idx
          when: item not in analytic_connections.json | map(attribute="name") | list
          changed_when: new_con.status_code == 201
          register: new_con
